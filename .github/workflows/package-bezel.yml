name: Package Bezel.app

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          ls /Applications | grep -i xcode || true
          # Prefer Xcode_26 / latest that ships Swift 6.2+
          for app in \
            /Applications/Xcode_26.0.app \
            /Applications/Xcode_26.app \
            /Applications/Xcode-beta.app \
            /Applications/Xcode.app
          do
            if [[ -d "$app" ]]; then
              echo "Selecting $app"
              sudo xcode-select -s "$app/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          swift --version

      - name: swift test
        run: swift test

      - name: Package Bezel.app
        run: bash scripts/package-bezel.sh

      - name: Zip app for download
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Bezel.app Bezel.app.zip

      - name: Upload Bezel.app.zip
        uses: actions/upload-artifact@v4
        with:
          name: Bezel.app
          path: dist/Bezel.app.zip
          if-no-files-found: error
